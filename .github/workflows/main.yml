name: CI Pipeline

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4   # ✅ updated

    - name: Setup Python
      uses: actions/setup-python@v5   # ✅ updated
      with:
        python-version: '3.10'   # ✅ FIXED

    - name: Install dependencies
      run: |
        pip install fastapi uvicorn sqlalchemy pydantic pytest

    - name: Run tests
      run: python -m pytest